<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aprendizagem de Sites</title>

<style>

/* RESET BÁSICO */
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* FUNDO */
body{
    font-family: Arial, Helvetica, sans-serif;

    background-image: url("fundo.png");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;

    padding: 30px;
}

/* TÍTULO */
h1{
    text-align: center;
    color: rgb(0, 174, 255);
    margin-bottom: 40px;
}

/* GRADE RESPONSIVA */
.galeria{
    display: grid;

    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));

    gap: 30px;

    max-width: 1200px;
    margin: auto;
}

/* CARD */
.card{
    text-align: center;
}

/* IMAGEM */
.card img{
    width: 100%;
    height: auto;

    border-radius: 10px;

    box-shadow: 0 0 15px rgba(0,0,0,0.6);
}

/* TEXTO */
.card h3{
    margin-top: 10px;

    padding: 10px;

    background: rgba(255,255,255,0.75);

    border-radius: 10px;

    color: rgb(87, 74, 0);
    font-size: 16px;
}

</style>
</head>

<body>

<h1>Galeria de Animais</h1>

<div class="galeria">

    <div class="card">
        <img src="cachorro.jpg" alt="Cachorro">
        <h3>Um belo auto retrato de sua beleza.</h3>
    </div>

    <div class="card">
        <img src="cavalo.jpg" alt="Cavalo">
        <h3>Se os dentes são assim, imagine a ferradura.</h3>
    </div>

    <div class="card">
        <img src="coruja.jpg" alt="Coruja">
        <h3>Felicidades depois de Harry pagar o 13º.</h3>
    </div>

    <div class="card">
        <img src="cabra.jpg" alt="Cabra">
        <h3>Não há necessidade de zuar cabras.</h3>
    </div>

    <div class="card">
        <img src="lobo.jpg" alt="Lobo">
        <h3>Postura de gamer é igualzinho.</h3>
    </div>

</div>

</body>
</html>
