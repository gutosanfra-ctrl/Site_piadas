<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aprendizagem de Sites</title>

<style>

body{
    background-image: url("fundo.png");
    background-size: cover;
    background-attachment: fixed;
    background-position: center;

    margin: 0;
    padding: 40px;

    font-family: Arial, Helvetica, sans-serif;
}

/* Título */

h1{
    text-align: center;
    color: rgb(0, 174, 255);
    margin-bottom: 50px;
}

/* Galeria */

.galeria{
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 40px;
}

/* Quadros */

.card{
    text-align: center;
    max-width: 220px;
}

.card img{
    width: 218px;
    height: 383px;

    border-radius: 10px;

    box-shadow: 0px 0px 15px black;
}

/* Textos */

.card h3{
    color: rgb(87, 74, 0);

    background-color: rgba(255,255,255,0.7);

    padding: 10px;

    border-radius: 10px;

    margin-top: 15px;
}

</style>
</head>

<body>

<h1>Galeria de Obras</h1>

<div class="galeria">

    <div class="card">
        <img src="cachorro.jpg" alt="Imagem de um cachorro">

        <h3>
        Um belo auto retrato de<br>
        sua beleza.
        </h3>
    </div>

    <div class="card">
        <img src="cavalo.jpg" alt="Imagem de um cavalo">

        <h3>
        Se os dentes são assim<br>
        imagine a ferradura
        </h3>
    </div>

    <div class="card">
        <img src="coruja.jpg" alt="Imagem de uma coruja">

        <h3>
        Felicidades depois de<br>
        Harry finalmente<br>
        pagar o 13º
        </h3>
    </div>

    <div class="card">
        <img src="cabra.jpg" alt="Imagem de uma cabra">

        <h3>
        Não há necessidade de<br>
        zuar cabras,<br>
        já nascem macabras
        </h3>
    </div>

    <div class="card">
        <img src="lobo.jpg" alt="Imagem de um lobo">

        <h3>
        Postura de gamer<br>
        é realmente igualzinho
        </h3>
    </div>

</div>

</body>
</html>
